    Cooldown: 4s
    Custom_0: [1, 2, 3, 4]
    Custom_1: [1, 2, 3, 4]
    Custom_2: [4, 8, 12, 16]
    overridable: [Custom_2]
    Abilities:
      - type: Heal
    Auras:
      - attribute: Heal
        value:
          type: Mul
          params:
            - type: Caster
              params: [Value]
            - type: Caster
              params: [Custom_0]
      - attribute: Value
        value:
          type: Mul
          params:
            - type: Caster
              params: [Custom_1]
            - type: Caster
              params: [Custom_2]
