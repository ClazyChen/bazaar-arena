    Tier: Bronze
    Tags: [Weapon]
    Damage: [10, 20, 40, 80]
    Abilities:
      - type: Damage
        trigger: UseItem
        ex_condition:
          type: And
          params:
            - LeftOfCaster
            - type: HasTag
              params: [Weapon]
  - Name: "舱底蠕虫"
    Desc: "敌方使用最左侧的物品时，造成 {Damage} 伤害；吸血"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Damage: [10, 20, 40, 80]
    LifeSteal: 100
    Abilities:
      # 使用显式 condition，勿用 ex_condition：UseItem 默认会与 SameSide 合并，
      # 而「敌方使用最左侧物品」要求 ctx.item 在敌方，与 SameSide 互斥。
      - type: Damage
        trigger: UseItem
        condition:
          type: Leftmost
          params:
            - type: And
              params:
                - DifferentSide
                - HasCooldown
