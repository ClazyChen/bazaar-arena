schemaVersion: 1
hero: Vanessa
items:
  - Name: "龙涎香"
    Desc: "▶ 获得治疗，等量于此物品的价值的 {Custom_0} 倍；【局外】购买水系物品时，此物品的价值提高 {Custom_1}；【默认】已购买水系物品数量: {Custom_2}"
    Size: Small
    Tier: Bronze
    Tags: [Aquatic, Relic]
    Cooldown: 4s
    Custom_0: [1, 2, 3, 4]
    Custom_1: [1, 2, 3, 4]
    Custom_2: [4, 8, 12, 16]
    Abilities:
      - type: Heal
    Auras:
      - attribute: Heal
        value:
          type: Mul
          params:
            - type: Caster
              params: [Value]
            - type: Caster
              params: [Custom_0]
      - attribute: Value
        value:
          type: Mul
          params:
            - type: Caster
              params: [Custom_1]
            - type: Caster
              params: [Custom_2]
  - Name: "刺刀"
    Desc: "使用此物品左侧的武器时，造成 {Damage} 伤害"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Damage: [10, 20, 40, 80]
    Abilities:
      - type: Damage
        trigger: UseItem
        ex_condition:
          type: And
          params:
            - LeftOfCaster
            - type: HasTag
              params: [Weapon]
  - Name: "舱底蠕虫"
    Desc: "敌方使用最左侧的物品时，造成 {Damage} 伤害；吸血"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Damage: [10, 20, 40, 80]
    LifeSteal: 100
    Abilities:
      # 使用显式 condition，勿用 ex_condition：UseItem 默认会与 SameSide 合并，
      # 而「敌方使用最左侧物品」要求 ctx.item 在敌方，与 SameSide 互斥。
      - type: Damage
        trigger: UseItem
        condition:
          type: Leftmost
          params:
            - type: And
              params:
                - DifferentSide
                - HasCooldown
  - Name: "流星索"
    Desc: "▶ 造成 {Damage} 伤害；▶ 减速 {SlowTargetCount} 件物品 {Slow} 秒；弹药：{AmmoCap}"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Cooldown: 4s
    Damage: [20, 40, 80, 160]
    Slow: [2s, 3s, 4s, 5s]
    SlowTargetCount: 1
    AmmoCap: 2
    Abilities:
      - type: Damage
      - type: Slow
  - Name: "三花"
    Desc: "▶ 造成 {Damage} 伤害；使用其他武器时，此物品暴击率提高 {Custom_0%}（限本场战斗）"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Cooldown: 6s
    Damage: [15, 30, 60, 120]
    Custom_0: [5, 10, 15, 20]
    Abilities:
      - type: Damage
      - type: AddAttribute
        trigger: UseItem
        key: CritRate
        value: Custom_0
        target_condition: SameAsCaster
        ex_condition:
          type: And
          params:
            - type: HasTag
              params: [Weapon]
            - DifferentFromCaster
  - Name: "毒须鲶"
    Desc: "▶ 造成 {Poison} 剧毒；此物品被加速时，其剧毒提高 {Custom_0}（限本场战斗）"
    Size: Small
    Tier: Bronze
    Tags: [Aquatic, Friend]
    Cooldown: 5s
    Poison: 3
    Custom_0: [2, 4, 6, 8]
    Abilities:
      - type: Poison
      - type: AddAttribute
        condition: TargetSameAsCaster
        trigger: Haste
        ex_target_condition: SameAsCaster
        key: Poison
        value: Custom_0
        priority: Low
  - Name: "鱼饵"
    Desc: "▶ 水系物品的暴击率提高 {Custom_0%}（限本场战斗）；【局外】购买此物品时，获得 1 件食人鱼"
    Size: Small
    Tier: Bronze
    Tags: [Aquatic, Food]
    Cooldown: 4s
    Custom_0: [3, 6, 9, 12]
    Abilities:
      - type: AddAttribute
        key: CritRate
        value: Custom_0
        priority: High
        ex_target_condition:
          type: And
          params:
            - type: HasTag
              params: [Aquatic]
            - CanCrit
  - Name: "藏刃匕首"
    Desc: "▶ 造成 {Damage} 伤害；▶ 加速 {HasteTargetCount} 件物品 {Haste} 秒；战斗开始时，获得 {Custom_0} 金币"
    Size: Small
    Tier: Bronze
    Tags: [Weapon]
    Cooldown: 4s
    Damage: [10, 20, 40, 80]
    Haste: [1s, 2s, 3s, 4s]
    Custom_0: 1
    HasteTargetCount: 1
    Abilities:
      - type: Damage
      - type: Haste
        priority: High
      - type: GainGold
        trigger: BattleStart
        value: Custom_0
  - Name: "珊瑚"
    Desc: "▶ 治疗 {Heal} 生命值；【局外】购买水系物品时，此物品的治疗提高 {Custom_0}；【默认】已购买水系物品数量: {Custom_1}"
    Size: Small
    Tier: Bronze
    Tags: [Aquatic, Relic]
    Cooldown: 5s
    Heal: 20
    Custom_0: [5, 10, 15, 20]
    Custom_1: [4, 8, 12, 16]
    Abilities:
      - type: Heal
    Auras:
      - attribute: Heal
        value:
          type: Mul
          params:
            - type: Caster
              params: [Custom_0]
            - type: Caster
              params: [Custom_1]
  - Name: "飞鱼"
    Desc: "▶ 造成 {Damage} 伤害；▶ 此物品和 {ModifyTargetCount} 件相邻物品开始飞行；使用飞行物品时，加速此物品 {Haste} 秒"
    Size: Small
    Tier: Bronze
    Tags: [Weapon, Aquatic, Friend]
    Cooldown: 5s
    Damage: [10, 20, 40, 80]
    ModifyTargetCount: 1
    Custom_0: 1
    Haste: 1s
    Abilities:
      - type: Damage
      - type: AddAttribute
        target_condition: SameAsCaster
        key: InFlight
        value: Custom_0
      - type: AddAttribute
        target_condition: AdjacentToCaster
        key: InFlight
        value: Custom_0
      - type: Haste
        trigger: UseItem
        ex_condition: InFlight
        target_condition: SameAsCaster